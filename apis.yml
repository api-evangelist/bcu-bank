aid: bcu-bank
url: https://raw.githubusercontent.com/api-evangelist/bcu-bank/refs/heads/main/apis.yml
name: BCU Bank
kind: company
description: BCU Bank is a customer-owned banking brand operated by Police & Nurses
  Limited (ABN 69 087 651 876), the mutual bank formed when Bananacoast Community
  Credit Union merged into the P&N Group. Headquartered on the New South Wales north
  coast, BCU serves retail and business members with everyday accounts, savings, home
  and personal lending, and cards. As an Authorised Deposit-taking Institution, BCU
  is a Consumer Data Right (CDR) Data Holder that exposes a public, unauthenticated
  Product Reference Data (PRD) API under the DSB Consumer Data Standards, and supports
  consumer data sharing to accredited data recipients through the CDR consent and
  Open Banking model. BCU does not run a general-purpose developer portal; its
  programmatic surface is the standards-based CDR banking API.
