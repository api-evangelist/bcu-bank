    payees, defined by the DSB Consumer Data Standards - Get Payees and Get Payee
    Detail, covering domestic, biller and international payee records. Not public;
    access is restricted to CDR Accredited Data Recipients acting on explicit member
    consent via the CDR OAuth2/OIDC FAPI authorization and consent flow. The contract
    is the shared DSB CDS Banking OpenAPI (v1.36.0), not a BCU-proprietary spec; BCU
    implements it as a legally obligated CDR Data Holder.
