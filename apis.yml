apis:
- aid: bcu-bank:bcu-bank-cdr-product-reference-data-api
  name: BCU Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Public API
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bcu.com.au/help-centre/open-banking/bcu-bank-products-api/
  baseURL: https://public.cdr-api.bcu.com.au/cds-au/v1/banking/products
  properties:
  - url: https://www.bcu.com.au/help-centre/open-banking/bcu-bank-products-api/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/bcu-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API conforming to the DSB Consumer Data Standards. GET /banking/products and
    /banking/products/{productId} return BCU's openly available banking products
    - transaction and savings accounts, residential mortgages, personal loans and
    cards - with fees, rates and eligibility. Confirmed live at
    https://public.cdr-api.bcu.com.au/cds-au/v1/banking/products (HTTP 200 with the
    x-v version header set to 4; live brand "BCU" products returned 2026-07-21). No
    authentication required.
- aid: bcu-bank:bcu-bank-cdr-accounts-and-balances-api
  name: BCU Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Consumer Authorized
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bcu.com.au/consumer-data-right-policy/
  baseURL: https://public.cdr-api.bcu.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.bcu.com.au/consumer-data-right-policy/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-accounts
    type: APIReference
  - url: openapi/bcu-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right banking surface for account
    lists and balances, defined by the DSB Consumer Data Standards - Get Accounts,
    Get Bulk Balances, Get Account Balance and Get Account Detail. Not public; access
    is restricted to CDR Accredited Data Recipients acting on explicit member consent
    via the CDR OAuth2/OIDC FAPI authorization and consent flow. The contract is the
    shared DSB CDS Banking OpenAPI (v1.36.0), not a BCU-proprietary spec; BCU
    implements it as a legally obligated CDR Data Holder.
