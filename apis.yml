  properties:
  - url: https://www.bcu.com.au/consumer-data-right-policy
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/bcu-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API conforming to the DSB Consumer Data Standards. GET /banking/products (and
    /banking/products/{productId}) returns BCU's openly available banking products
    - transaction and savings accounts, residential mortgages, personal loans and
    cards - with fees, rates and eligibility. Confirmed live at
    https://public.cdr-api.bcu.com.au/cds-au/v1/banking/products (HTTP 200, x-v up
    to 5, 76 products, brand "BCU").
- aid: bcu-bank:bcu-bank-cdr-consumer-data-sharing-api
  name: BCU Bank CDR Consumer Data Sharing API
  tags:
  - CDR
  - Open Banking
  - Consumer Data Sharing
  - OIDC
  - FAPI
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bcu.com.au/consumer-data-right-policy
  baseURL: https://public.cdr-api.bcu.com.au/cds-au/v1
  properties:
  - url: https://www.bcu.com.au/consumer-data-right-policy
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api
    type: APIReference
  - url: openapi/bcu-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Authenticated Consumer Data Right banking data-sharing surface (accounts,
    balances, transactions, direct debits, payees and payment scheduling) defined by
    the DSB Consumer Data Standards. Not public - access is restricted to CDR
    Accredited Data Recipients acting on explicit member consent via the CDR
    OAuth2/OIDC FAPI authorization and consent flow. Listed for completeness of BCU's
    CDR Data Holder obligations; the underlying contract is the shared CDS Banking
    OpenAPI, not a BCU-proprietary spec.
